# EDIT: Set 'addresses' to a free IP range within your LAN subnet.
# Example: if your nodes are on 192.168.1.x, use something like 192.168.1.200-192.168.1.210
# These IPs must NOT be in your router's DHCP range to avoid conflicts.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: kbucci-pool
  namespace: metallb-system
spec:
  addresses:
  - 10.0.2.240-10.0.2.250   # EDIT: replace with your actual free IP range
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: kbucci-l2
  namespace: metallb-system
spec:
  ipAddressPools:
  - kbucci-pool