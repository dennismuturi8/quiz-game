apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-service
  namespace: quiz-game
  labels:
    app: leaderboard-service
    app.kubernetes.io/part-of: quiz-game
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leaderboard-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: leaderboard-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3002"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: leaderboard-service
          image: DOCKER_USER/leaderboard-service:IMAGE_TAG   # updated by CI
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: NODE_ENV
              value: "production"
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "128Mi", cpu: "300m" }
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
