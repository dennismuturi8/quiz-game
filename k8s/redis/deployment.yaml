apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: quiz-game
  labels:
    app: redis
    app.kubernetes.io/part-of: quiz-game
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          # PVC removed — kubeadm on AWS has no default StorageClass so the
          # PVC never bound, keeping Redis Pending for 8+ hours.
          # emptyDir is sufficient for this quiz game; data clears on restart.
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          resources:
            requests: { memory: "64Mi",  cpu: "50m"  }
            limits:   { memory: "128Mi", cpu: "200m" }
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}