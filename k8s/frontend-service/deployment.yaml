apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: quiz-game
  labels:
    app: frontend-service
    app.kubernetes.io/part-of: quiz-game
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend-service
    spec:
      containers:
        - name: frontend-service
          image: dennismuturi8/frontend-app:sha-49e2fd8c85cbcb6bec1b0dd28e1e422d94523110
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests: { memory: "64Mi",  cpu: "25m"  }
            limits:   { memory: "128Mi", cpu: "200m" }
          livenessProbe:
            httpGet:
              # Changed from /health to / — a standard nginx container serving
              # a React SPA has no /health route. Probing /health returns 404,
              # which fails the probe after 3 attempts, kills the pod, and
              # causes the eviction cascade that created 60+ failed pods.
              # The root path always returns 200 for a correctly built SPA.
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        # nginx writes pid and cache files at runtime. Without these emptyDir
        # mounts the container crashes if the image runs as non-root with a
        # read-only filesystem. Safe to include even without explicit
        # readOnlyRootFilesystem: true — costs nothing, prevents subtle fails.
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}