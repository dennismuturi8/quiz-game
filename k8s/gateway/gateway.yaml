# =============================================================================
# gateway.yaml — quiz-game-gateway
# Namespace: nginx-gateway
#
# Single HTTP listener on port 80 accepting *.nip.io hostnames.
# All traffic enters through this listener; the HTTPRoute (httproute.yaml)
# splits it by path prefix.
#
# MetalLB assigns an IP from the kbucci-pool to the data-plane service
# (quiz-game-gateway-nginx) created by NGF for this Gateway.
# External traffic reaches it via ALB → NodePort 31000 — the MetalLB IP
# is available for internal cluster access only (AWS VPC does not propagate
# L2 ARP so the VIP is not reachable from outside the cluster network).
#
# Verify after apply:
#   kubectl get gateway quiz-game-gateway -n nginx-gateway
#   # PROGRAMMED column must be True before HTTPRoutes will work.
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: quiz-game-gateway
  namespace: nginx-gateway
  labels:
    app.kubernetes.io/part-of: quiz-game
    app.kubernetes.io/managed-by: argocd
  annotations:
    # MetalLB pool name — must match the IPAddressPool resource name in
    # k8s/metallb/metallb-config.yaml (kbucci-pool).
    metallb.universe.tf/address-pool: kbucci-pool
    gateway.nginx.org/nginx-proxy: quiz-game-proxy
spec:
  gatewayClassName: nginx

  listeners:
    # ── HTTP listener — accepts all *.nip.io hostnames ───────────────────────
    # HTTPRoutes must specify hostnames matching *.nip.io (or no hostname,
    # which inherits this filter).  Direct IP access does not match *.nip.io
    # so always use the nip.io URL: http://quiz.<ALB_IP>.nip.io
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.nip.io"
      allowedRoutes:
        namespaces:
          from: All

    # ── HTTPS listener (uncomment when TLS certificate is available) ──────────
    # - name: https
    #   protocol: HTTPS
    #   port: 443
    #   hostname: "*.nip.io"
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - name: quiz-tls-secret
    #         kind: Secret
    #   allowedRoutes:
    #     namespaces:
    #       from: All