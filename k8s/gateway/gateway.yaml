# =============================================================================
# Gateway — quiz-game-gateway
# Namespace-scoped resource in the "quiz-game" namespace.
#
# This Gateway has a SINGLE listener on port 80 for quiz.kbucci.local.
# All traffic — UI, game API, and leaderboard API — enters through this one
# listener. The HTTPRoute (httproute.yaml) splits it by path, not by hostname.
#
# The manage.sh urls command reads the nginx-gateway service's LoadBalancer
# hostname/IP to build the nip.io URL: http://quiz.<ALB_IP>.nip.io
#
# Verify after apply:
#   kubectl get gateway quiz-game-gateway -n nginx-gateway
#   # ADDRESS column must be populated before the HTTPRoute works.
#   kubectl describe gateway quiz-game-gateway -n quiz-game
#   # PROGRAMMED condition must be True.
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: quiz-game-gateway
  namespace: nginx-gateway
  labels:
    app.kubernetes.io/part-of: quiz-game
    app.kubernetes.io/managed-by: argocd
  annotations:
    # MetalLB: assign an IP from this pool (bare-metal / AWS bare-metal only)
    metallb.universe.tf/address-pool: kbucci-pool
spec:
  gatewayClassName: nginx

  listeners:
    # ── Single HTTP listener for the quiz game ───────────────────────────────
    # All requests for quiz.kbucci.local arrive here and are forwarded to
    # the HTTPRoute below which splits them by path prefix.
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.nip.io"
      allowedRoutes:
        namespaces:
          from: All    

    # ── HTTPS listener (uncomment when TLS certificate is available) ──────────
