# =============================================================================
# HTTPRoute — quiz-game-route
# Namespace: nginx-gateway
#
# FIX: Added namespace: quiz-game to all backendRefs.
# The HTTPRoute lives in nginx-gateway. Without an explicit namespace on each
# backendRef, Gateway API defaults to the HTTPRoute's own namespace (nginx-gateway)
# where none of the quiz-game services exist — causing ResolvedRefs: False and
# a 502 on every request.
#
# A ReferenceGrant in the quiz-game namespace (referencegrant.yaml) is also
# required to permit this cross-namespace reference.
#
# Path-based routing table:
#   /api/game/*        → game-service:3001       (prefix stripped)
#   /api/leaderboard/* → leaderboard-service:3002 (prefix stripped)
#   /*                 → frontend-service:80
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: quiz-game-route
  namespace: nginx-gateway
  labels:
    app.kubernetes.io/part-of: quiz-game
    app.kubernetes.io/managed-by: argocd
spec:
  parentRefs:
    - name:        quiz-game-gateway
      namespace:   nginx-gateway
      sectionName: http

  hostnames:
    - "*.nip.io"

  rules:

    # ── Rule 1: Game Service API ───────────────────────────────────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /api/game
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name:      game-service
          namespace: quiz-game          # FIXED: explicit namespace
          port:      3001
          weight:    1

    # ── Rule 2: Leaderboard Service API ───────────────────────────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /api/leaderboard
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name:      leaderboard-service
          namespace: quiz-game          # FIXED: explicit namespace
          port:      3002
          weight:    1

    # ── Rule 3: Frontend Service (catch-all) ───────────────────────────────────
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name:      frontend-service
          namespace: quiz-game          # FIXED: explicit namespace
          port:      80
          weight:    1