# =============================================================================
# HTTPRoute — quiz-game-route
# Namespace-scoped resource in the "quiz-game" namespace.
#
# Path-based routing table (evaluated top-to-bottom, most specific first):
#
#   Browser request                   Gateway rewrites to     Backend
#   ────────────────────────────────────────────────────────────────────────────
#   GET /api/game/questions           GET /questions          game-service:3001
#   POST /api/game/check              POST /check             game-service:3001
#   GET /api/leaderboard/leaderboard  GET /leaderboard        leaderboard-service:3002
#   POST /api/leaderboard/score       POST /score             leaderboard-service:3002
#   GET /                             GET /                   frontend-service:80
#   GET /health                       GET /health             frontend-service:80
#
# Why URL rewriting matters:
#   The browser calls  GET /api/game/questions
#   The Gateway strips /api/game → game-service receives GET /questions
#   This matches the Express route defined in game-service/server.js exactly.
#   Without the rewrite, game-service would receive GET /api/game/questions
#   and return 404.
#
# Verify after apply:
#   kubectl describe httproute quiz-game-route -n quiz-game
#   # "Parents" section must show Accepted=True, ResolvedRefs=True
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: quiz-game-route
  namespace: quiz-game
  labels:
    app.kubernetes.io/part-of: quiz-game
    app.kubernetes.io/managed-by: argocd
spec:
  # Attach to the quiz-game-gateway, specifically the quiz-http listener
  parentRefs:
    - name:        quiz-game-gateway
      namespace:   quiz-game
      sectionName: quiz-http

  # Hostname must match the Gateway listener hostname
  hostnames:
    - "quiz.kbucci.local"

  rules:

    # ── Rule 1: Game Service API ───────────────────────────────────────────────
    # Matches:  /api/game/questions
    #           /api/game/questions/random?count=10
    #           /api/game/check  (POST)
    # Rewrites: strips /api/game → game-service receives /questions, /check etc.
    - matches:
        - path:
            type: PathPrefix
            value: /api/game
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name:   game-service
          port:   3001
          weight: 1

    # ── Rule 2: Leaderboard Service API ───────────────────────────────────────
    # Matches:  /api/leaderboard/leaderboard
    #           /api/leaderboard/score  (POST)
    # Rewrites: strips /api/leaderboard → leaderboard-service receives /leaderboard, /score etc.
    - matches:
        - path:
            type: PathPrefix
            value: /api/leaderboard
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name:   leaderboard-service
          port:   3002
          weight: 1

    # ── Rule 3: Frontend Service (catch-all) ───────────────────────────────────
    # Matches:  everything not matched above — the quiz game UI
    # No rewrite needed — frontend-service serves from /
    # Also handles /health (Nginx returns {"status":"ok"} from its own config)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name:   frontend-service
          port:   80
          weight: 1
