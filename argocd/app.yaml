---
# App 5 — Gateway resources (GatewayClass + Gateway + HTTPRoute)
# FIXED: was three separate apps each pointing to individual files.
# ArgoCD path must be a directory. Consolidating to k8s/gateway applies
# all three manifests in one sync — correct and simpler.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-app
  namespace: argocd                          # FIXED: was nginx-gateway
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dennismuturi8/quiz-game.git
    targetRevision: main
    path: k8s/gateway                       # FIXED: directory, not individual files
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# App 6 — MetalLB config (IPAddressPool + L2Advertisement)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-app
  namespace: argocd                          # FIXED: was metallb-system
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dennismuturi8/quiz-game.git
    targetRevision: main
    path: k8s/metallb                       # FIXED: directory, not metallb-config.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true