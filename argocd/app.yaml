---
# =============================================================================
# app.yaml — ArgoCD Application manifests for Quiz Game
#
# CRITICAL: ALL Application resources MUST have metadata.namespace: argocd
# ArgoCD's application-controller only watches the argocd namespace.
# Setting namespace to quiz-game/nginx-gateway/etc means ArgoCD never sees
# these apps — they are invisible to it and nothing gets deployed.
#
# path: must always point to a DIRECTORY, not a file.
# ArgoCD reads all .yaml files in the directory and applies them.
# =============================================================================

# App 1 — Frontend service
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-app
  namespace: argocd                          # FIXED: was quiz-game
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dennismuturi8/quiz-game.git
    targetRevision: main
    path: k8s/frontend-service              # directory — OK
  destination:
    server: https://kubernetes.default.svc
    namespace: quiz-game
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

